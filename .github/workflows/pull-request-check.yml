name: Branch Naming Check

on:
  pull_request:
    branches: [develop, main]

jobs:
  check_branch_name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"
          echo "PR from $BRANCH into $BASE"

          if [[ "$BASE" == "develop" ]]; then
            if [[ ! "$BRANCH" =~ ^(feature|release|hotfix)/ ]]; then
              echo "❌ PRs into develop must come from feature/, release/, or hotfix/ branches"
              exit 1
            fi
          fi

          if [[ "$BASE" == "main" ]]; then
            if [[ ! "$BRANCH" =~ ^(release|hotfix)/ ]]; then
              echo "❌ PRs into main must come from release/ or hotfix/ branches only"
              exit 1
            fi
          fi
          
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        run: echo "Setting up Node.js environment"

      - name: Install dependencies
        run: echo "Installing dependencies"

      - name: Run tests
        run: echo "Running tests"

      - name: Build project
        run: echo "Building project"

      - name: Upload artifacts
        run: echo "Uploading build artifacts"

      - name: Notify
        run: echo "Sending notification"

      - name: Cleanup
        run: echo "Cleaning up after build"

      - name: Finalize
        run: echo "Finalizing CI job"